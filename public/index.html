<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- Viewport crítico para móvil: evitar zoom automático -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>¡Juega Ahora!</title>

  <!-- Socket.io desde CDN — única dependencia externa -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #1a1a1a;
      --border:     #2a2a2a;
      --txt:        #f0f0f0;
      --txt-dim:    #888;
      --accent:     #c8f542;   /* verde-lima eléctrico — el pulso del juego */
      --accent-dim: #7aad1a;
      --danger:     #ff4d4d;
      --wait:       #3a3a3a;
      --wait-txt:   #666;
      --gold:       #ffd700;
      --radius:     16px;
      --font:       'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font);
      -webkit-tap-highlight-color: transparent; /* evitar flash azul al tocar en iOS */
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh; /* dvh: unidad moderna que excluye barras del navegador */
      padding: 24px 20px;
      gap: 0;
    }

    /* ─── Pantalla de Login ─────────────────────────────────────────────────── */
    #pantalla-login {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: aparecer 0.4s ease;
    }

    .logo-marca {
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--txt-dim);
      font-weight: 500;
    }

    .titulo-bienvenida {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .titulo-bienvenida span {
      color: var(--accent);
    }

    .subtitulo {
      font-size: 15px;
      color: var(--txt-dim);
      text-align: center;
      line-height: 1.5;
    }

    .form-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--txt-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      padding: 18px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--txt);
      font-size: 20px;
      font-family: var(--font);
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input[type="text"]::placeholder { color: var(--wait-txt); font-weight: 400; }
    input[type="text"]:focus { border-color: var(--accent); }

    /* ─── Botones ───────────────────────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.02em;
      -webkit-appearance: none;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    /* ─── Pantalla de Juego ─────────────────────────────────────────────────── */
    #pantalla-juego {
      width: 100%;
      max-width: 380px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: aparecer 0.4s ease;
    }

    .jugador-info {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
    }

    .jugador-avatar {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #0d0d0d;
      flex-shrink: 0;
    }

    .jugador-nombre {
      font-size: 15px;
      font-weight: 600;
      color: var(--txt);
    }

    /* ─── Estado visual ─────────────────────────────────────────────────────── */
    .estado-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      transition: all 0.3s ease;
    }

    .estado-badge.esperando {
      background: rgba(58, 58, 58, 0.5);
      border: 1px solid var(--border);
      color: var(--txt-dim);
    }

    .estado-badge.activo {
      background: rgba(200, 245, 66, 0.15);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .estado-badge.enviado {
      background: rgba(200, 245, 66, 0.08);
      border: 1px solid var(--accent-dim);
      color: var(--accent-dim);
    }

    .pulso {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pulso.gris { background: var(--wait-txt); }

    .pulso.verde {
      background: var(--accent);
      animation: pulsar 1s infinite;
    }

    /* ─── Botón GIGANTE de juego ────────────────────────────────────────────── */
    #btn-juego {
      width: 100%;
      min-height: 200px;
      border-radius: 24px;
      font-size: clamp(22px, 7vw, 30px);
      font-weight: 900;
      letter-spacing: -0.02em;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      -webkit-appearance: none;
      touch-action: manipulation; /* reduce latencia de 300ms en móviles */
    }

    #btn-juego:not(:disabled):active {
      transform: scale(0.96);
    }

    #btn-juego.estado-espera {
      background: var(--wait);
      color: var(--wait-txt);
      cursor: not-allowed;
      box-shadow: none;
    }

    #btn-juego.estado-listo {
      background: var(--accent);
      color: #0d0d0d;
      box-shadow: 0 0 60px rgba(200, 245, 66, 0.35),
                  0 0 120px rgba(200, 245, 66, 0.15);
      animation: latir 0.6s ease infinite alternate;
      cursor: pointer;
    }

    #btn-juego.estado-enviado {
      background: var(--surface);
      color: var(--txt-dim);
      border: 2px solid var(--border);
      cursor: not-allowed;
    }

    .btn-icono { font-size: clamp(40px, 12vw, 60px); line-height: 1; }
    .btn-subtexto { font-size: 13px; font-weight: 500; opacity: 0.7; margin-top: 4px; }

    /* ─── Resultado del ganador ─────────────────────────────────────────────── */
    #resultado {
      display: none;
      width: 100%;
      padding: 24px;
      border-radius: var(--radius);
      text-align: center;
      animation: aparecer 0.5s ease;
    }

    #resultado.ganador {
      background: rgba(200, 245, 66, 0.1);
      border: 2px solid var(--accent);
    }

    #resultado.perdedor {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .resultado-posicion {
      font-size: clamp(60px, 20vw, 80px);
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
    }

    .resultado-etiqueta {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--txt-dim);
      margin-top: 4px;
    }

    .resultado-mensaje {
      font-size: 16px;
      font-weight: 600;
      margin-top: 12px;
      color: var(--txt);
      line-height: 1.4;
    }

    /* ─── Animaciones ───────────────────────────────────────────────────────── */
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulsar {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.85); }
    }

    @keyframes latir {
      from { box-shadow: 0 0 40px rgba(200, 245, 66, 0.3), 0 0 80px rgba(200, 245, 66, 0.1); }
      to   { box-shadow: 0 0 80px rgba(200, 245, 66, 0.5), 0 0 160px rgba(200, 245, 66, 0.2); }
    }

    /* ─── Error / notificación ──────────────────────────────────────────────── */
    #notificacion {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--txt);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      white-space: nowrap;
      z-index: 100;
    }

    #notificacion.visible { transform: translateX(-50%) translateY(0); }

    /* ─── Indicador de conexión ─────────────────────────────────────────────── */
    #dot-conexion {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }

    #dot-conexion.conectado { background: var(--accent); }
  </style>
</head>
<body>

  <!-- Indicador de conexión en tiempo real -->
  <div id="dot-conexion" title="Estado de conexión"></div>

  <!-- ── Pantalla 1: Login ──────────────────────────────────────────────────── -->
  <div id="pantalla-login">
    <p class="logo-marca">Congreso 2025</p>

    <h1 class="titulo-bienvenida">
      ¿Estás<br /><span>listo para</span><br />competir?
    </h1>

    <p class="subtitulo">
      Sé uno de los primeros 20 en presionar<br />cuando el host dé la señal.
    </p>

    <div class="form-group">
      <label for="input-alias">Tu nombre o alias</label>
      <input
        type="text"
        id="input-alias"
        placeholder="Ej: MariaPérez"
        maxlength="30"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="words"
        spellcheck="false"
      />
    </div>

    <button class="btn btn-primary" id="btn-unirse">
      Entrar al juego →
    </button>
  </div>

  <!-- ── Pantalla 2: Juego ──────────────────────────────────────────────────── -->
  <div id="pantalla-juego">

    <div class="jugador-info">
      <div class="jugador-avatar" id="avatar-inicial">?</div>
      <span class="jugador-nombre" id="label-alias">Jugador</span>
    </div>

    <div class="estado-badge esperando" id="badge-estado">
      <span class="pulso gris" id="pulso"></span>
      <span id="texto-estado">Esperando que el host inicie...</span>
    </div>

    <!-- El botón gigante — protagonista de la UI -->
    <button
      id="btn-juego"
      class="estado-espera"
      disabled
      aria-label="Botón principal del juego"
    >
      <span class="btn-icono" id="btn-icono">⏳</span>
      <span id="btn-texto">ESPERA LA SEÑAL</span>
      <span class="btn-subtexto" id="btn-subtexto">El host aún no ha iniciado</span>
    </button>

    <!-- Resultado (aparece tras presionar) -->
    <div id="resultado">
      <div class="resultado-posicion" id="resultado-posicion"></div>
      <div class="resultado-etiqueta" id="resultado-etiqueta"></div>
      <div class="resultado-mensaje" id="resultado-mensaje"></div>
    </div>

  </div>

  <!-- Notificación flotante -->
  <div id="notificacion"></div>

  <script>
    // ─── Elementos DOM ──────────────────────────────────────────────────────────
    const pantallaLogin  = document.getElementById("pantalla-login");
    const pantallaJuego  = document.getElementById("pantalla-juego");
    const inputAlias     = document.getElementById("input-alias");
    const btnUnirse      = document.getElementById("btn-unirse");
    const btnJuego       = document.getElementById("btn-juego");
    const labelAlias     = document.getElementById("label-alias");
    const avatarInicial  = document.getElementById("avatar-inicial");
    const badgeEstado    = document.getElementById("badge-estado");
    const pulso          = document.getElementById("pulso");
    const textoEstado    = document.getElementById("texto-estado");
    const btnIcono       = document.getElementById("btn-icono");
    const btnTexto       = document.getElementById("btn-texto");
    const btnSubtexto    = document.getElementById("btn-subtexto");
    const divResultado   = document.getElementById("resultado");
    const rPosicion      = document.getElementById("resultado-posicion");
    const rEtiqueta      = document.getElementById("resultado-etiqueta");
    const rMensaje       = document.getElementById("resultado-mensaje");
    const dotConexion    = document.getElementById("dot-conexion");
    const notificacion   = document.getElementById("notificacion");

    // ─── Estado local del jugador ────────────────────────────────────────────
    let miAlias = "";
    let yaPresione = false; // bandera anti-spam local

    // ─── Conexión Socket.io ──────────────────────────────────────────────────
    // La URL vacía conecta al mismo servidor que sirvió la página
    const socket = io({ autoConnect: true, reconnectionAttempts: 10 });

    // ─── Helpers UI ──────────────────────────────────────────────────────────

    /** Muestra un mensaje flotante temporalmente */
    function mostrarNotificacion(msg, duracion = 2500) {
      notificacion.textContent = msg;
      notificacion.classList.add("visible");
      setTimeout(() => notificacion.classList.remove("visible"), duracion);
    }

    /** Pone el botón de juego en estado "espera" */
    function btnModoEspera() {
      btnJuego.disabled = true;
      btnJuego.className = "estado-espera";
      btnIcono.textContent = "⏳";
      btnTexto.textContent = "ESPERA LA SEÑAL";
      btnSubtexto.textContent = "El host aún no ha iniciado";
    }

    /** Pone el botón en estado "¡listo para presionar!" */
    function btnModoListo() {
      btnJuego.disabled = false;
      btnJuego.className = "estado-listo";
      btnIcono.textContent = "⚡";
      btnTexto.textContent = "¡PRESIONA YA!";
      btnSubtexto.textContent = "¡Toca el botón ahora!";
    }

    /** Pone el botón en modo "enviado/espera resultado" */
    function btnModoEnviado() {
      btnJuego.disabled = true;
      btnJuego.className = "estado-enviado";
      btnIcono.textContent = "📡";
      btnTexto.textContent = "¡Enviado!";
      btnSubtexto.textContent = "Esperando resultados...";
    }

    /** Actualiza el badge de estado */
    function actualizarBadge(tipo, texto) {
      badgeEstado.className = `estado-badge ${tipo}`;
      textoEstado.textContent = texto;
      pulso.className = `pulso ${tipo === "activo" ? "verde" : "gris"}`;
    }

    // ─── Eventos de Conexión ──────────────────────────────────────────────────
    socket.on("connect", () => {
      dotConexion.className = "conectado";
      // Si ya teníamos alias, reconectarse automáticamente
      if (miAlias) {
        socket.emit("unirse", { alias: miAlias });
      }
    });

    socket.on("disconnect", () => {
      dotConexion.className = "";
      mostrarNotificacion("Conexión perdida, reconectando...", 4000);
    });

    // ─── Sincronización inicial del estado ────────────────────────────────────
    socket.on("estado_actual", ({ ronda }) => {
      // Si la ronda ya está activa cuando entramos, actualizamos la UI
      if (ronda === "activa" && miAlias && !yaPresione) {
        btnModoListo();
        actualizarBadge("activo", "¡Ronda en curso! ¡Presiona ya!");
      }
    });

    // ─── Flujo del Jugador ────────────────────────────────────────────────────

    /** Validación y envío del alias */
    function manejarUnirse() {
      const alias = inputAlias.value.trim();
      if (!alias) {
        inputAlias.focus();
        mostrarNotificacion("Escribe tu nombre o alias para entrar.");
        return;
      }
      miAlias = alias;
      socket.emit("unirse", { alias });
    }

    socket.on("unido", ({ alias, ronda }) => {
      // Actualizar UI con alias confirmado por el servidor
      labelAlias.textContent = alias;
      avatarInicial.textContent = alias.charAt(0).toUpperCase();
      miAlias = alias;

      // Mostrar pantalla de juego
      pantallaLogin.style.display = "none";
      pantallaJuego.style.display = "flex";

      // Ajustar estado según la ronda actual
      if (ronda === "activa" && !yaPresione) {
        btnModoListo();
        actualizarBadge("activo", "¡Ronda activa! ¡Toca ya!");
      } else {
        btnModoEspera();
        actualizarBadge("esperando", "Esperando que el host inicie...");
      }
    });

    /** El host inició la ronda */
    socket.on("ronda_iniciada", () => {
      yaPresione = false;
      divResultado.style.display = "none";
      btnModoListo();
      actualizarBadge("activo", "¡La ronda ha comenzado!");
    });

    /** El jugador presiona el botón grande */
    btnJuego.addEventListener("click", () => {
      if (yaPresione || btnJuego.disabled) return;

      // Bloqueo local inmediato para evitar doble toque
      yaPresione = true;
      btnModoEnviado();
      actualizarBadge("enviado", "¡Enviado! Esperando resultado...");

      socket.emit("presionar_boton");
    });

    /** Respuesta del servidor tras presionar */
    socket.on("resultado_boton", ({ exito, posicion, razon }) => {
      divResultado.style.display = "block";

      if (exito) {
        divResultado.className = "ganador";
        rPosicion.textContent = `#${posicion}`;
        rEtiqueta.textContent = "POSICIÓN OBTENIDA";
        rMensaje.textContent =
          posicion <= 3
            ? "🏆 ¡Increíble! Estás en el top 3."
            : "🎉 ¡Lo lograste! Eres uno de los 20 ganadores.";
      } else {
        divResultado.className = "perdedor";
        rPosicion.textContent = "😔";
        rEtiqueta.textContent = "NO ESTA VEZ";
        rMensaje.textContent = razon || "Los 20 cupos ya fueron llenados. ¡Suerte en la próxima!";
      }
    });

    /** La ronda terminó (llegamos a 20) */
    socket.on("ronda_terminada", () => {
      if (!yaPresione) {
        btnModoEspera();
        btnIcono.textContent = "🏁";
        btnTexto.textContent = "RONDA TERMINADA";
        btnSubtexto.textContent = "Los 20 cupos ya fueron llenados";
        actualizarBadge("esperando", "Ronda finalizada");
      }
    });

    /** El host reinicia todo */
    socket.on("juego_reiniciado", () => {
      yaPresione = false;
      divResultado.style.display = "none";
      btnModoEspera();
      actualizarBadge("esperando", "Esperando que el host inicie...");
    });

    // ─── Eventos del formulario de login ──────────────────────────────────────
    btnUnirse.addEventListener("click", manejarUnirse);

    inputAlias.addEventListener("keydown", (e) => {
      if (e.key === "Enter") manejarUnirse();
    });
  </script>
</body>
</html>
